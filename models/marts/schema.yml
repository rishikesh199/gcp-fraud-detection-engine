version: 2

models:
  - name: fct_fraud_transactions
    description: >
      Unified fact table combining batch (CSV) and streaming (real-time) transactions.
      UNION ALL of stg_transactions + stg_streaming_transactions.
      Partitioned by transaction_date, clustered by transaction_type, fraud_band, data_source.
    columns:
      - name: transaction_id
        description: "Unique transaction ID"
        tests:
          - not_null
          - unique
      - name: event_timestamp
        description: "Transaction timestamp"
        tests:
          - not_null
      - name: transaction_date
        description: "Transaction date (partition key)"
        tests:
          - not_null
      - name: customer_id_masked
        description: "SHA-256 masked customer ID"
        tests:
          - not_null
      - name: transaction_type
        description: "Transaction type"
        tests:
          - not_null
      - name: amount
        description: "Transaction amount"
        tests:
          - not_null
      - name: merchant_category
        description: "Merchant category"
        tests:
          - not_null
      - name: fraud_score
        description: "Fraud risk score 0-100"
        tests:
          - not_null
      - name: fraud_band
        description: "Fraud risk band"
        tests:
          - not_null
          - accepted_values:
              values:
                - "LOW"
                - "MEDIUM"
                - "HIGH"
                - "CRITICAL"
      - name: is_fraud
        description: "Fraud flag"
        tests:
          - not_null
      - name: action_required
        description: "Required action"
        tests:
          - not_null
          - accepted_values:
              values:
                - "CLEAR"
                - "MONITOR"
                - "REVIEW"
                - "BLOCK"
      - name: data_source
        description: "batch_csv or streaming_realtime"
        tests:
          - not_null
          - accepted_values:
              values:
                - "batch_csv"
                - "streaming_realtime"
      - name: transaction_month
        description: "YYYY-MM format for trend analysis"
        tests:
          - not_null

  - name: fct_fraud_kpis
    description: >
      Daily KPI summary aggregated from unified fact table.
      Includes fraud rates, amount stats, risk distribution, and source breakdown.
    columns:
      - name: report_date
        description: "Reporting date (partition key)"
        tests:
          - not_null
          - unique
      - name: total_transactions
        description: "Total transaction count for the day"
        tests:
          - not_null
      - name: fraud_transactions
        description: "Number of fraud transactions"
        tests:
          - not_null
      - name: fraud_rate_pct
        description: "Fraud rate percentage"
        tests:
          - not_null
      - name: total_amount
        description: "Sum of all amounts"
        tests:
          - not_null
      - name: fraud_amount
        description: "Sum of fraud amounts"
        tests:
          - not_null
      - name: batch_records
        description: "Records from batch pipeline"
        tests:
          - not_null
      - name: streaming_records
        description: "Records from streaming pipeline"
        tests:
          - not_null

  - name: dim_transaction_type
    description: >
      Transaction type dimension with fraud analysis per type.
      Covers all 17 transaction types.
    columns:
      - name: transaction_type
        description: "Transaction type"
        tests:
          - not_null
          - unique
      - name: total_transactions
        description: "Total transactions for this type"
        tests:
          - not_null
      - name: fraud_rate_pct
        description: "Fraud rate for this type"
        tests:
          - not_null

  - name: dim_merchant_category
    description: >
      Merchant category dimension with risk level analysis.
      Includes risk classification: LOW_RISK, MEDIUM_RISK, HIGH_RISK, VERY_HIGH_RISK.
    columns:
      - name: merchant_category
        description: "Merchant category"
        tests:
          - not_null
          - unique
      - name: total_transactions
        description: "Total transactions"
        tests:
          - not_null
      - name: risk_level
        description: "Category risk level"
        tests:
          - not_null
          - accepted_values:
              values:
                - "LOW_RISK"
                - "MEDIUM_RISK"
                - "HIGH_RISK"
                - "VERY_HIGH_RISK"

  - name: dim_geography
    description: >
      Geographic dimension with fraud hotspot analysis.
      Risk levels: NORMAL, ELEVATED, HIGH_RISK, FRAUD_HOTSPOT.
    columns:
      - name: country
        description: "ISO country code"
        tests:
          - not_null
      - name: city
        description: "City name"
        tests:
          - not_null
      - name: total_transactions
        description: "Total transactions"
        tests:
          - not_null
      - name: location_risk_level
        description: "Location risk level"
        tests:
          - not_null
          - accepted_values:
              values:
                - "NORMAL"
                - "ELEVATED"
                - "HIGH_RISK"
                - "FRAUD_HOTSPOT"
