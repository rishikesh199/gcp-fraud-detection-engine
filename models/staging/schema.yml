# ============================================================
# File: models/staging/schema.yml
# Purpose: Tests and documentation for staging models
# ============================================================

version: 2

models:

  # ==========================================================
  # BATCH STAGING
  # ==========================================================

  - name: stg_transactions
    description: "Cleaned and standardized batch transaction data."

    columns:

      - name: step
        description: "Transaction step from the source dataset."
        tests:
          - not_null

      - name: transaction_type
        description: "Type of financial transaction."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - PAYMENT
                  - TRANSFER
                  - CASH_IN
                  - CASH_OUT
                  - DEBIT

      - name: amount
        description: "Transaction amount."
        tests:
          - not_null

      - name: nameOrig_masked
        description: "SHA-256 hashed sender account identifier."
        tests:
          - not_null

      - name: nameDest_masked
        description: "SHA-256 hashed receiver account identifier."
        tests:
          - not_null

      - name: isFraud
        description: "Fraud indicator from source system."
        tests:
          - not_null

      - name: isFlaggedFraud
        description: "Flag for suspicious high-value fraud transactions."
        tests:
          - not_null

      - name: amount_category
        description: "Transaction amount bucket."
        tests:
          - not_null

      - name: fraud_band
        description: "Fraud risk classification."
        tests:
          - not_null

      - name: processing_timestamp
        description: "Timestamp when transaction was processed."
        tests:
          - not_null

      - name: source_file
        description: "Original source file."

      - name: loaded_at
        description: "Timestamp when dbt loaded the record."
        tests:
          - not_null

      - name: data_source
        description: "Pipeline source."
        tests:
          - not_null

  # ==========================================================
  # STREAMING STAGING
  # ==========================================================

  - name: stg_streaming_transactions
    description: "Cleaned and standardized streaming transaction data."

    columns:

      - name: transaction_id
        description: "Unique transaction identifier."
        tests:
          - not_null
          - unique

      - name: event_timestamp
        description: "Original event timestamp."
        tests:
          - not_null

      - name: customer_id_masked
        description: "Masked customer identifier."
        tests:
          - not_null

      - name: card_number_masked
        description: "Masked card number."

      - name: amount
        description: "Transaction amount."
        tests:
          - not_null

      - name: currency
        description: "Transaction currency."

      - name: merchant_name
        description: "Merchant name."

      - name: merchant_category
        description: "Merchant category."

      - name: country
        description: "Country."

      - name: city
        description: "City."

      - name: ip_address_masked
        description: "Masked IP address."

      - name: device_id_masked
        description: "Masked device identifier."

      - name: fraud_score
        description: "Fraud score."

      - name: fraud_band
        description: "Fraud risk band."

      - name: is_fraud_predicted
        description: "Prediction generated by fraud model."

      - name: processing_timestamp
        description: "Streaming processing timestamp."

      - name: loaded_at
        description: "Timestamp when dbt loaded the record."

      - name: data_source
        description: "Pipeline source."